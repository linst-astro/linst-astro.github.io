---
layout: compress
---
<link rel="stylesheet" href="/assets/css/dark-mode.css">
<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <!-- Nebula Layer -->
    <div class="nebula-layer"></div>

    <!-- Aurora Effect -->
    <div class="aurora-effect"></div>

    <!-- Twinkling Stars -->
    <div class="twinkling-stars">
      <div class="twinkle-star" style="top: 10%; left: 15%; width: 2px; height: 2px; animation-delay: 0s;"></div>
      <div class="twinkle-star" style="top: 25%; left: 75%; width: 1.5px; height: 1.5px; animation-delay: 0.5s;"></div>
      <div class="twinkle-star" style="top: 45%; left: 35%; width: 2px; height: 2px; animation-delay: 1s;"></div>
      <div class="twinkle-star" style="top: 60%; left: 85%; width: 1px; height: 1px; animation-delay: 1.5s;"></div>
      <div class="twinkle-star" style="top: 75%; left: 20%; width: 2px; height: 2px; animation-delay: 2s;"></div>
      <div class="twinkle-star" style="top: 90%; left: 65%; width: 1.5px; height: 1.5px; animation-delay: 2.5s;"></div>
      <div class="twinkle-star" style="top: 15%; left: 50%; width: 1px; height: 1px; animation-delay: 3s;"></div>
      <div class="twinkle-star" style="top: 55%; left: 10%; width: 2px; height: 2px; animation-delay: 0.3s;"></div>
      <div class="twinkle-star" style="top: 35%; left: 90%; width: 1.5px; height: 1.5px; animation-delay: 1.2s;"></div>
      <div class="twinkle-star" style="top: 80%; left: 45%; width: 1px; height: 1px; animation-delay: 1.8s;"></div>
    </div>

    <!-- Pulsars (Pulsating Stars) -->
    <div class="pulsar" style="top: 30%; left: 20%;"></div>
    <div class="pulsar" style="top: 70%; left: 80%;"></div>
    <div class="pulsar" style="top: 50%; left: 60%;"></div>

    <!-- Shooting Stars Animation Container -->
    <div class="shooting-stars">
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
    </div>

    <div id="main" role="main">
      {% include sidebar.html %}

      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>

    {% include scripts.html %}

<div class="footer_site">
<hr/>
<div class="footer_copyright">
  copyright © 2026 All rights reserved.
</div>
</div>

<!-- Scroll Indicator -->
<div class="scroll-indicator">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
  </svg>
</div>

  </body>
</html>
